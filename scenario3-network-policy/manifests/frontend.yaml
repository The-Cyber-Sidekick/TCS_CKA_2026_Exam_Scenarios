apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        # busybox stays alive (sleep) and ships wget, so we can exec in and probe
        # the backend Service to prove the policy works.
        - name: frontend
          image: busybox:1.36
          command: ["sleep", "3600"]
