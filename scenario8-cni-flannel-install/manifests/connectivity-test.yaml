# Two pods pinned to different nodes, used to prove the CNI actually carries pod-to-pod
# traffic across the overlay (not just that the flannel pods are Running). test1 lands on
# the worker, test2 on the control-plane (hence the control-plane toleration). Once flannel
# is healthy each gets an IP from 192.168.0.0/16; ping test2's IP from test1 and the packet
# rides the vxlan tunnel between nodes.
#
# nodeName pins each pod directly (bypassing the scheduler) so the cross-node test is
# deterministic on this two-node kind cluster.
apiVersion: v1
kind: Pod
metadata:
  name: test1
  namespace: default
  labels:
    app: conn-test
spec:
  nodeName: cka-scenario8-worker
  containers:
    - name: box
      image: busybox:1.36
      command: ["sleep", "3600"]
---
apiVersion: v1
kind: Pod
metadata:
  name: test2
  namespace: default
  labels:
    app: conn-test
spec:
  nodeName: cka-scenario8-control-plane
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  containers:
    - name: box
      image: busybox:1.36
      command: ["sleep", "3600"]
