kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: cka-scenario8
# Two nodes and NO default CNI, so installing one is the whole exercise. The pod CIDR is
# 192.168.0.0/16 on purpose: the stock flannel manifest ships net-conf.json with
# Network 10.244.0.0/16, so a straight apply mismatches the cluster and the flannel pods
# CrashLoop with "failed to acquire lease ... not in the flannel net configuration".
# A second node makes the pod-to-pod connectivity test cross the vxlan overlay for real.
networking:
  disableDefaultCNI: true
  podSubnet: "192.168.0.0/16"
nodes:
  - role: control-plane
  - role: worker
