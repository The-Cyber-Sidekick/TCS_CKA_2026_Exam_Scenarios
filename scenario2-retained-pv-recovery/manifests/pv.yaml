apiVersion: v1
kind: PersistentVolume
metadata:
  name: mariadb
spec:
  capacity:
    storage: 250Mi
  accessModes:
    - ReadWriteOnce
  # The whole point of the scenario: Retain keeps the data when the claim (and the
  # deployment) are deleted, so the volume can be re-bound to a fresh PVC.
  persistentVolumeReclaimPolicy: Retain
  # Empty string = static binding only. Without this, kind's default "standard"
  # StorageClass would dynamically provision a NEW volume instead of binding this one.
  storageClassName: ""
  hostPath:
    path: /mnt/mariadb-data
    type: DirectoryOrCreate
