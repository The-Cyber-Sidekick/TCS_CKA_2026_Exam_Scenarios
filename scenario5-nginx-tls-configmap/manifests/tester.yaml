# A long-lived curl pod so we can probe the nginx Service over TLS and pin the
# client's max TLS version (curl --tls-max). nginx:alpine has no curl, so we use a
# dedicated client. Exec in with: kubectl -n nginx-static exec deploy/tester -- curl ...
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tester
  namespace: nginx-static
  labels:
    app: tester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tester
  template:
    metadata:
      labels:
        app: tester
    spec:
      containers:
        - name: curl
          image: curlimages/curl:8.10.1
          command: ["sleep", "infinity"]
