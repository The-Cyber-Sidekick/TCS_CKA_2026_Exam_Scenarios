# Two pods pinned to different nodes, used twice: first to prove pods CAN communicate
# (cross-node ping succeeds once Calico is up), then to prove NetworkPolicy enforcement
# (the same ping fails after deny-all.yaml is applied). test1 lands on the worker, test2
# on the control-plane (hence the control-plane toleration).
#
# nodeName pins each pod directly (bypassing the scheduler) so the cross-node test is
# deterministic on this two-node kind cluster.
apiVersion: v1
kind: Pod
metadata:
  name: test1
  namespace: default
  labels:
    app: conn-test
spec:
  nodeName: cka-scenario9-worker
  containers:
    - name: box
      image: busybox:1.36
      command: ["sleep", "3600"]
---
apiVersion: v1
kind: Pod
metadata:
  name: test2
  namespace: default
  labels:
    app: conn-test
spec:
  nodeName: cka-scenario9-control-plane
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  containers:
    - name: box
      image: busybox:1.36
      command: ["sleep", "3600"]
